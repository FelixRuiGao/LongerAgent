name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: bun run build

      - name: Smoke test
        run: |
          test -x build/fermi
          file build/fermi
          test -f build/fermi-darwin-arm64.tar.gz
          ls -lh build/fermi-darwin-arm64.tar.gz
          ./build/fermi --version

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v4
        with:
          name: fermi-darwin-arm64
          path: build/fermi-darwin-arm64.tar.gz
          if-no-files-found: error

      - name: Create release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            build/fermi-darwin-arm64.tar.gz \
            --title "$tag" \
            --generate-notes
